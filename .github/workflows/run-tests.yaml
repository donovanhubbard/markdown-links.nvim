name: Run Tests
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install NeoVim
        run: |
          curl -LO https://github.com/neovim/neovim/releases/tag/0.12.2/download/nvim.appimage
          chmod u+x nvim.appimage
          ./nvim.appimage
      - name: Run tests from makefile
        run: make test


